name: Integration Tests
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install system tools
        run: sudo apt-get install -y ffmpeg
      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-test.txt yt-dlp==2026.3.13
      - name: Run integration tests
        env:
          DECODO_PROXY_URL: ${{ secrets.DECODO_PROXY_URL }}
        run: pytest -m integration --override-ini="addopts="
